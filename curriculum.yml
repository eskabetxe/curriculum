about: >-
  Staff Data Software Engineer with 18+ years building highly scalable,
  real-time data platforms that eliminate critical bottlenecks. Specialised
  in streaming architecture (Apache Flink, Kafka), cloud-native
  infrastructure (AWS, Kubernetes) and developer experience, with deep
  hands-on expertise in Trino, Iceberg, Java and Python. Active open-source
  contributor (Flink, Trino; former PMC of Apache Bahir) with a track
  record of shipping self-serve tooling and championing 'shift-left' Data
  Mesh strategies. Drive engineering teams through major technical
  evolutions, ensuring infrastructure is not only robust and scalable but
  fundamentally easier for domain teams to use.

