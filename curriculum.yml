            description: "Architected outbound data feed systems integrating with 20+ international and national portals, orchestrating the continuous export of real estate data from Spain, Italy and Portugal to worldwide markets. Orchestrated complex NRT data transformations to adapt to disparate external formats, ensuring listing accuracy and drastically reducing customer complaints."
