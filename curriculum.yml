        highlights:
          - title: "Data Mesh & Shift-Left Strategy"
            description: "Championed a decentralized Data Mesh architecture by building self-serve platform capabilities. This drove a strategic 'shift-left', transferring pipeline ownership and data responsibility to domain engineering teams while providing continuous platform support and architectural guidance."
          - title: "Data Lake & Event Pipeline Modernization"
            description: "Architected the evolution of the data lake for real-time streaming, driving the migration from Hive to Iceberg and currently to Paimon, contributing upstream PRs to the Trino-Paimon connector. Led the migration of 500+ topics from a legacy EL system to a modern platform with multi-table event transformation, enabling teams to materialize multiple tables per event source."
          - title: "Real-Time CDC Architecture & DR Optimization"
            description: "Spearheaded the shift from 200 legacy batch extractions to a near real-time CDC ecosystem (contributing upstream PRs to FlinkCdc and Flink-JDBC), reducing data latency from D-1 to NRT — 25% of legacy extractions already migrated. Further re-architected CDC snapshotting to target AWS Aurora Global read-replicas, cutting initial snapshot times from ~1 hour to ~10 minutes while protecting production performance and improving disaster recovery resilience."
          - title: "Developer Experience (DX) & CI/CD Automation"
            description: "Built an internal developer portal and a companion GitHub App to abstract complex GitOps processes and automate CI/CD workflows. Leveraging Crossplane, this self-serve tooling deployed data pipelines across ~30 Kubernetes clusters while integrating SQLFluff (with upstream contributions) to strictly enforce SQL standards and pipeline governance."
          - title: "ML Platform & MLOps Tooling"
            description: "Drove the evaluation and PoC selection of a unified Machine Learning platform for Data Science teams. After benchmarking Metaflow and other alternatives, deployed Kubeflow to standardize AI workloads and model lifecycles."
          - title: "Cloud FinOps & Cost Optimization"
            description: "Drove infrastructure cost-reduction initiatives by migrating Kubernetes workloads from AMD to ARM and dynamically right-sizing Flink job resources, reducing cloud expenditure by ~30% without sacrificing pipeline latency."
          - title: "Data Governance & Privacy"
            description: "Built automated data classification frameworks to strictly enforce GDPR compliance, applying dynamic data masking for Personally Identifiable Information (PII) directly at the query layer."

