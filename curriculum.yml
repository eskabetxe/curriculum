          - title: "Enterprise CDC & Core Infrastructure"
            description: "Co-managed enterprise-wide Kafka infrastructure and Oracle GoldenGate implementations alongside the DBA team. Built high-throughput CDC pipelines on Apache Flink to extract database events and reliably land them into the Data Lake."
          - title: "Real-Time BI & Self-Serve Tooling"
            description: "Crafted Flink-based self-serve streaming tools that empowered BI and Data Engineering teams to migrate operational dashboards from delayed batch loads to NRT, reflecting business activity in near-real-time."
